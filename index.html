<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZehrtyDEV</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <script src="https://kit.fontawesome.com/4b8b3c3c5f.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #0b0b1a;
      color: #e0e0ff;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    header {
      text-align: center;
      padding: 120px 20px 100px;
      background: radial-gradient(circle at top, rgba(168, 85, 247, 0.2), transparent);
    }

    .profile {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid #a855f7;
      margin-bottom: 20px;
      animation: glowPulse 3s infinite;
    }

    @keyframes glowPulse {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
      }

      50% {
        box-shadow: 0 0 40px rgba(168, 85, 247, 0.7);
      }
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #c4b5fd;
    }

    .hero-buttons {
      margin-top: 25px;
    }

    a {
      display: inline-block;
      margin: 10px;
      padding: 12px 22px;
      background: #a855f7;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
      animation: glowBtn 2s infinite alternate;
    }

    @keyframes glowBtn {
      from {
        box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
      }

      to {
        box-shadow: 0 0 25px rgba(168, 85, 247, 0.7);
      }
    }

    a:hover {
      background: #9333ea;
    }

    .secondary {
      background: transparent;
      border: 1px solid #a855f7;
    }

    section {
      max-width: 900px;
      margin: auto;
      padding: 50px 20px;
      border-bottom: 1px solid #2a2a40;
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s ease;
    }

    section.show {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      margin-bottom: 20px;
    }

    p {
      color: #c4b5fd;
      line-height: 1.6;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .skill {
      background: #1a1a2e;
      padding: 10px 15px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #2a2a40;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .skill:hover {
      transform: scale(1.05);
      border-color: #a855f7;
    }

    .exp {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
      border: 1px solid #2a2a40;
      transition: all 0.3s ease;
    }

    .timeline {
      position: relative;
      margin-top: 30px;
      padding-left: 30px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 0;
      width: 2px;
      height: 0%;
      background: #a855f7;
      box-shadow: 0 0 10px #a855f7;
      transition: height 0.3s ease;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 40px;
      transition: all 0.3s ease;
    }

    .timeline-item.active {
      transform: scale(1.03);
    }

    .timeline-item.active .exp {
      transform: scale(1.05);
      background: #2a1a4a;
      border-color: #a855f7;
      box-shadow: 0 20px 40px rgba(168, 85, 247, 0.4);
    }

    .timeline-item.active .timeline-icon {
      transform: scale(1.2);
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.9);
    }

    .timeline-icon {
      position: absolute;
      left: -5px;
      top: 0;
      background: #a855f7;
      color: white;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #a855f7;
    }
  </style>
</head>

<body>

  <canvas id="particles"></canvas>

  <header>
    <img src="https://via.placeholder.com/120" class="profile" alt="Foto de Manuel Amado">
    <h1>Manuel Amado (Zehrty)</h1>
    <p class="subtitle">Especialista en Soporte TI | Futuro Desarrollador Web</p>

    <div class="hero-buttons">
      <a href="#proyectos">Ver proyectos</a>
      <a href="#contacto" class="secondary">Contáctame</a>
    </div>
  </header>

  <section class="about">
    <h2>Sobre mí</h2>
    <p>Tu texto original aquí...</p>
  </section>

  <section>
    <h2>Experiencia</h2>
    <div class="timeline">

      <div class="timeline-item">
        <div class="timeline-icon"><i class="fas fa-server"></i></div>
        <div class="exp">Contenido experiencia...</div>
      </div>

      <div class="timeline-item">
        <div class="timeline-icon"><i class="fas fa-hospital"></i></div>
        <div class="exp">Contenido experiencia...</div>
      </div>

    </div>
  </section>

  <script>
    let ticking = false;

    window.addEventListener("scroll", () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          handleScroll();
          ticking = false;
        });
        ticking = true;
      }
    });

    function handleScroll() {
      const sections = document.querySelectorAll("section");
      const timeline = document.querySelector(".timeline");
      const items = document.querySelectorAll(".timeline-item");

      sections.forEach(sec => {
        if (sec.getBoundingClientRect().top < window.innerHeight - 100) {
          sec.classList.add("show");
        }
      });

      if (timeline) {
        const rect = timeline.getBoundingClientRect();
        const progress = Math.min(Math.max((window.innerHeight - rect.top) / rect.height, 0), 1);
        timeline.style.setProperty("--line-height", `${progress * 100}%`);
      }

      let closest = null;
      let min = Infinity;

      items.forEach(item => {
        const rect = item.getBoundingClientRect();

        if (rect.top < window.innerHeight && rect.bottom > 0) {
          const center = rect.top + rect.height / 2;
          const distance = Math.abs(window.innerHeight / 2 - center);

          if (distance < min) {
            min = distance;
            closest = item;
          }
        }
      });

      items.forEach(i => i.classList.remove("active"));
      if (closest) closest.classList.add("active");
    }

    // CANVAS RESPONSIVE
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    // PARTICULAS NATURALES
    let particles = Array.from({ length: 60 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      dx: (Math.random() - 0.5) * 1,
      dy: (Math.random() - 0.5) * 1,
      r: Math.random() * 2
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(168,85,247,0.5)";
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>

</body>

</html>
